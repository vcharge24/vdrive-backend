version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vdrive-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vdrive_users}
      POSTGRES_USER: ${POSTGRES_USER:-vdrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vdrive123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vdrive-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vdrive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Eureka Discovery Server
  discovery-server:
    build:
      context: ./vdrive-backend/discovery-server
      dockerfile: Dockerfile
    container_name: vdrive-discovery-server
    ports:
      - "${DISCOVERY_SERVER_PORT:-8761}:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-server
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    networks:
      - vdrive-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/eureka/apps"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - postgres

  # API Gateway
  api-gateway:
    build:
      context: ./vdrive-backend/api-gateway
      dockerfile: Dockerfile
    container_name: vdrive-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_INSTANCE_ID: api-gateway:8080
      JWT_SECRET: ${JWT_SECRET:-vdrive-jwt-secret-key-for-development-only-change-in-production}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_AE_VDRIVE: ${LOGGING_LEVEL_AE_VDRIVE:-DEBUG}
    networks:
      - vdrive-network
    depends_on:
      discovery-server:
        condition: service_healthy
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./vdrive-backend/user-service
      dockerfile: Dockerfile
    container_name: vdrive-user-service
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_APPLICATION_NAME: user-service
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vdrive_users}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-vdrive}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vdrive123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: user-service
      EUREKA_INSTANCE_INSTANCE_ID: user-service:8081
      JWT_SECRET: ${JWT_SECRET:-vdrive-jwt-secret-key-for-development-only-change-in-production}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_AE_VDRIVE: ${LOGGING_LEVEL_AE_VDRIVE:-DEBUG}
    networks:
      - vdrive-network
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./vdrive-backend/notification-service
      dockerfile: Dockerfile
    container_name: vdrive-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8082
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: notification-service
      EUREKA_INSTANCE_INSTANCE_ID: notification-service:8082
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT: 5000
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT: 5000
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT: 5000
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_AE_VDRIVE: ${LOGGING_LEVEL_AE_VDRIVE:-DEBUG}
    networks:
      - vdrive-network
    depends_on:
      discovery-server:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (React/Vite with Nginx)
  frontend:
    build:
      context: ./vdrive-platform
      dockerfile: Dockerfile
    container_name: vdrive-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - vdrive-network
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

networks:
  vdrive-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
