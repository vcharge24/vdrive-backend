# Nginx configuration for Vdrive Platform SPA

upstream api_gateway {
    server api-gateway:8080;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;
    gzip_vary on;

    # Serve static files from /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache control for static assets
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Don't cache HTML files
        location ~* \.html?$ {
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
        }

        # Cache JS and CSS files for 1 year
        location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Cache images for 1 month
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            add_header Cache-Control "public, max-age=2592000" always;
        }
    }

    # Proxy API calls to the API Gateway
    location /api/ {
        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;

        # Headers for proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Additional proxy locations for specific services if needed
    location /eureka/ {
        proxy_pass http://discovery-server:8761/eureka/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
